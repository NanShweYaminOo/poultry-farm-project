spring.application.name=broiler-farming-system
spring.datasource.url=jdbc:mysql://localhost:3305/broiler_db
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Quartz: persistent (JDBC) job store so scheduled medicine alarms survive
# app restarts/redeploys. Schema is auto-created on the app's own MySQL
# datasource from Quartz's bundled qrtz_*.sql script.
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate
spring.quartz.properties.org.quartz.jobStore.isClustered=false
spring.quartz.properties.org.quartz.threadPool.threadCount=5

# JWT auth. app.jwt.secret MUST be overridden via an environment variable
# (or a real secrets manager) in any non-local deployment -- this default is
# for local dev only. HS256 needs >= 256 bits; this is 512 bits.
app.jwt.secret=${JWT_SECRET:0f3d9c7a2b6e4f81c5d9a3b7e1f4c8d2a6b0e3f7c1d5a9b3e7f0c4d8a2b6e0f4c8d2a6b0e4f8c2d6a0b4e8f2c6d0a4b8e2f6c0d4a8b2e6f0}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# One-time bootstrap: if no ADMIN user exists yet, one is created on startup
# from these credentials so the ADMIN-only endpoints are reachable without a
# manual DB insert. Change the password immediately in any real deployment.
app.admin.bootstrap-enabled=true
app.admin.default-username=admin
app.admin.default-email=admin@broiler.local
app.admin.default-password=${ADMIN_BOOTSTRAP_PASSWORD:ChangeMe123!}

# AI Chatbot (Spring AI + OpenAI). OPENAI_API_KEY MUST be set via an
# environment variable -- there is no default; the app boots fine without
# one, but /api/v1/chatbot/diagnose will fail at call time until it's set.
# gpt-4o is vision-capable, required for the image-upload diagnosis flow.
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4o

server.port=8083

# Admin JSP views under src/main/webapp/WEB-INF/jsp/
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# PdfGenerationService uses Thymeleaf's TemplateEngine directly (never via a
# controller returning a view name), so ThymeleafViewResolver never needs to
# participate in MVC view resolution -- but Spring Boot auto-registers it
# into the resolver chain regardless, and by default it claims ANY view name
# unconditionally (it does not check the .html file exists before accepting
# the view -- that only fails later, deep inside rendering). That means it
# wins ahead of the JSP resolver (InternalResourceViewResolver) for every JSP
# view too, breaking every /admin/**, /public/**, /farmer/** and /guest/** page.
# spring.thymeleaf.check-template only affects Thymeleaf's own resource
# resolver, not this claiming behavior, so it can't fix it. Restricting the
# view names Thymeleaf is allowed to claim to the ones it actually owns lets
# every other view name fall through to the JSP resolver instead.
spring.thymeleaf.view-names=reports/*

# Filesystem directory (outside the jar) where uploaded profile photos are
# stored; served back at /uploads/** via WebConfig.
app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Real SMS delivery (VonageSmsService) only activates under the "sms-live"
# Spring profile -- e.g. SPRING_PROFILES_ACTIVE=sms-live -- alongside real
# credentials below. Every other profile (including no profile at all, and
# every test) gets LoggingSmsService instead; see both classes' Javadoc.
app.sms.vonage.api-key=${VONAGE_API_KEY:}
app.sms.vonage.api-secret=${VONAGE_API_SECRET:}
# Vonage alphanumeric Sender ID shown as the SMS "from" -- must be
# pre-registered with Vonage for the destination country before use.
app.sms.vonage.sender-id=${VONAGE_SMS_SENDER_ID:BroilerFarm}
app.sms.rate-limit-per-second=${SMS_RATE_LIMIT_PER_SECOND:5}